name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dev environment
        run: uv sync --all-extras --dev

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy

      - name: Run tests
        run: uv run pytest

  conformance:
    name: conformance ${{ matrix.library }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        library:
          - "xgboost==3.1.*"
          - "xgboost==3.2.*"
          # lightgbm 4.5's sklearn wrapper predates scikit-learn 1.7's API cleanup
          - "lightgbm==4.5.* scikit-learn==1.6.*"
          - "lightgbm==4.6.*"
          - "catboost==1.2.*"
          - "scikit-learn==1.6.*"
          - "scikit-learn==1.7.*"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dev environment
        run: uv sync --all-extras --dev

      - name: Pin library under test
        run: uv pip install ${{ matrix.library }}

      - name: Run IR conformance suite
        run: uv run pytest tests/ir/
