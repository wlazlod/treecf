site_name: treecf
site_description: Constrained, threshold-aware counterfactual explanations for tree ensembles.
site_url: https://wlazlod.github.io/treecf/
repo_url: https://github.com/wlazlod/treecf
repo_name: wlazlod/treecf

strict: true

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
  - mkdocs-jupyter:
      execute: false  # notebooks are committed executed; CI re-executes them separately

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - How it works: how-it-works.md
  - Concepts:
      - Models and the IR: concepts/models.md
      - Targets: concepts/targets.md
      - Calibration: concepts/calibration.md
      - Constraints: concepts/constraints.md
      - Missing values: concepts/missing-values.md
      - Plausibility: concepts/plausibility.md
      - Coalitions: concepts/coalitions.md
      - Backends and proofs: concepts/backends.md
  - Tutorials:
      - Quickstart: notebooks/01-quickstart.ipynb
      - Credit-risk walkthrough: notebooks/02-credit-risk-tutorial.ipynb
      - No-solver environments: notebooks/03-no-solver-environments.ipynb
  - API reference: api.md
  - FAQ: faq.md
